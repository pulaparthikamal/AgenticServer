# Standard Tasks Configuration
draft_task:
  description: >
    Research and write a draft about {topic}. 
    Use the following context if available: {research_text}
  expected_output: >
    A 500-word draft in markdown format.
  agent: writer

review_task:
  description: >
    Review the draft provided by the writer. 
    Focus on {tone} and {brand_voice}.
  expected_output: >
    A revised version of the draft with editorial notes.
  agent: reviewer

optimize_task:
  description: >
    Finalize the content for {audience}. 
    Add a call to action: {call_to_action}
  expected_output: >
    The final publication-ready version.
  agent: optimizer
